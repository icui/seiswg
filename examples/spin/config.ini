[workflow]
mode = forward

[solver]
sh   = no
psv  = yes
spin = yes
nt   = 2000
dt   = 0.0001

abs_top    = no
abs_bottom = no
abs_left   = no
abs_right  = no
abs_width  = 20
abs_alpha  = 0.015

save_snapshot    = 200
combine_sources  = yes
threads_per_block = 128

[path]
output        = output
output_traces = output
model_true    = model
sources       = sources.dat
stations      = stations.dat
