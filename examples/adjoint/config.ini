[workflow]
mode = adjoint

[solver]
sh  = yes
psv = no
nt  = 4800
dt  = 0.06

abs_top    = no
abs_bottom = yes
abs_left   = yes
abs_right  = yes
abs_width  = 20
abs_alpha  = 0.015

adj_interval = 10
smooth       = 5.0
combine_sources = no

[path]
output     = output
model_init = model_init
sources    = sources.dat
stations   = stations.dat
traces     = obs_traces
