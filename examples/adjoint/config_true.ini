[workflow]
mode = forward

[solver]
sh  = yes
psv = no
nt  = 4800
dt  = 0.06

abs_top    = no
abs_bottom = yes
abs_left   = yes
abs_right  = yes
abs_width  = 20
abs_alpha  = 0.015

save_snapshot   = 0
combine_sources = no

[path]
output         = obs_trash
output_traces  = obs_traces
model_init     = model_true
sources        = sources.dat
stations       = stations.dat
