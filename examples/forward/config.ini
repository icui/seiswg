[workflow]
mode = forward

[solver]
sh = yes
psv = no
nt = 1200
dt = 0.015

abs_top    = no
abs_bottom = yes
abs_left   = yes
abs_right  = yes
abs_width  = 20
abs_alpha  = 0.015

save_snapshot    = 100
combine_sources  = yes
threads_per_block = 128

[path]
output        = output
output_traces = output/traces
model_init    = model
sources       = sources.dat
stations      = stations.dat
